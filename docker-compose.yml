services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: powerflex
      POSTGRES_PASSWORD: powerflex
      POSTGRES_DB: powerflex
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powerflex -d powerflex"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: infra/Dockerfiles/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://powerflex:powerflex@postgres:5432/powerflex
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-dev-secret}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    command: ["sh", "-c", "npm run db:migrate && node apps/api/dist/main.js"]

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfiles/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://powerflex:powerflex@postgres:5432/powerflex
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-15}
    depends_on:
      - api
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: infra/Dockerfiles/web.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
